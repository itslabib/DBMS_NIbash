<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nibash Database Schema Diagram</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 h-screen w-screen overflow-hidden font-sans text-slate-800 flex flex-col">

    <!-- Top Navigation Bar -->
    <nav class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shadow-sm z-50 print:hidden shrink-0">
        <div>
            <h1 class="text-xl font-bold text-indigo-700">Nibash Schema Diagram</h1>
            <p class="text-xs text-slate-500">Detailed Table Architecture View</p>
        </div>
        <div class="flex space-x-3">
            <button id="reset-btn" class="px-4 py-2 bg-red-50 hover:bg-red-100 text-red-700 text-sm font-medium rounded-md transition duration-200 flex items-center border border-red-200">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Reset Layout
            </button>
            <button id="toggle-color-btn" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium rounded-md transition duration-200 flex items-center border border-slate-300">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                Toggle B&W
            </button>
            <button id="print-btn" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-md transition duration-200 flex items-center shadow-sm">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                Print Landscape
            </button>
        </div>
    </nav>

    <!-- Infinite Interactive Canvas Area -->
    <div id="canvas-container" class="flex-1 w-full relative overflow-hidden bg-slate-50 color-mode-bg select-none">
        
        <!-- Draggable Plane where tables live -->
        <div id="diagram-plane" class="absolute top-0 left-0 w-full h-full origin-top-left z-20">
            <!-- SVG Layer for drawing relation lines -->
            <svg id="svg-layer" class="absolute top-0 left-0 w-full h-full pointer-events-none z-10" style="overflow: visible;"></svg>
            <!-- Table Cards will be injected here by JS -->
        </div>
    </div>

    <!-- Data and Scripts -->
    <script src="../er/schema_data.js"></script>
    <script src="app.js"></script>
</body>
</html>
